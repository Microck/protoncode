name: release-linux

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach artifacts to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: install linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            rpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: build release binary
        run: cargo build --locked --release

      - name: stage linux release files
        run: |
          version="${{ env.RELEASE_TAG }}"
          archive_root="dist/protoncode-${version}-linux-x86_64"
          mkdir -p "$archive_root"
          cp target/release/protoncode "$archive_root/"
          cp packaging/linux/protoncode.desktop "$archive_root/"
          cp assets/protoncode-icon.png "$archive_root/"
          cp README.md LICENSE "$archive_root/"
          tar -C dist -czf "dist/protoncode-${version}-linux-x86_64.tar.gz" "protoncode-${version}-linux-x86_64"

      - name: build deb package
        run: cargo deb --no-build --output "dist/protoncode-${{ env.RELEASE_TAG }}-linux-x86_64.deb"

      - name: build rpm package
        run: |
          cargo generate-rpm
          cp target/generate-rpm/*.rpm "dist/protoncode-${{ env.RELEASE_TAG }}-linux-x86_64.rpm"

      - name: upload linux release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/protoncode-*-linux-x86_64.tar.gz
            dist/protoncode-*-linux-x86_64.deb
            dist/protoncode-*-linux-x86_64.rpm
