name: release-please

on:
  push:
    branches: [master, main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: google-github-actions/release-please-action@v4
        with:
          release-type: rust
          package-name: protoncode

  build-windows:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: build release binary
        run: cargo build --locked --release --target x86_64-pc-windows-msvc

      - name: stage release files
        shell: pwsh
        run: |
          $version = "${{ needs.release-please.outputs.tag_name }}"
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/protoncode.exe" "dist/protoncode-$version-windows-x86_64.exe"

      - name: upload release exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/protoncode-*.exe

  build-linux:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: install linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            rpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: build release binary
        run: cargo build --locked --release

      - name: stage linux release files
        run: |
          version="${{ needs.release-please.outputs.tag_name }}"
          archive_root="dist/protoncode-${version}-linux-x86_64"
          mkdir -p "$archive_root"
          cp target/release/protoncode "$archive_root/"
          cp packaging/linux/protoncode.desktop "$archive_root/"
          cp assets/protoncode-icon.png "$archive_root/"
          cp README.md LICENSE "$archive_root/"
          tar -C dist -czf "dist/protoncode-${version}-linux-x86_64.tar.gz" "protoncode-${version}-linux-x86_64"

      - name: build deb package
        run: cargo deb --no-build --output "dist/protoncode-${{ needs.release-please.outputs.tag_name }}-linux-x86_64.deb"

      - name: build rpm package
        run: |
          cargo generate-rpm
          cp target/generate-rpm/*.rpm "dist/protoncode-${{ needs.release-please.outputs.tag_name }}-linux-x86_64.rpm"

      - name: upload linux release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/protoncode-*-linux-x86_64.tar.gz
            dist/protoncode-*-linux-x86_64.deb
            dist/protoncode-*-linux-x86_64.rpm
